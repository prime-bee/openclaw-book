<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <rect width="1200" height="520" fill="#f7f9fc"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Mapa de portas derivadas</text>
  <text x="60" y="105" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">A doc recomenda deixar folga para browser/canvas/CDP não colidirem entre instâncias.</text>

  <rect x="80" y="170" width="1040" height="90" rx="18" fill="#eef6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="110" y="205" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">Instância A</text>
  <text x="110" y="235" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">Base 18789 → browser control 18791 → CDP autoalocado a partir de 18800</text>

  <rect x="80" y="310" width="1040" height="90" rx="18" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="110" y="345" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#6d28d9">Instância B</text>
  <text x="110" y="375" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">Base 19001 ou 19789 → browser control base+2 → faixa CDP separada</text>

  <line x1="250" y1="260" x2="250" y2="310" stroke="#9ca3af" stroke-width="4"/>
  <text x="275" y="295" font-family="Arial, sans-serif" font-size="16" fill="#374151">deixe pelo menos ~20 portas livres entre bases</text>

  <rect x="80" y="430" width="1040" height="50" rx="12" fill="#111827"/>
  <text x="110" y="462" font-family="Arial, sans-serif" font-size="18" fill="#ffffff">Footgun clássico: reaproveitar base, CDP fixo ou browser.cdpUrl igual em duas instâncias.</text>
</svg>
