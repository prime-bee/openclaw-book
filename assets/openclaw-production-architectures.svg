<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720"><rect width="1200" height="720" fill="#f8fafc"/><text x="60" y="70" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#111827">Arquiteturas de produção para OpenClaw</text><text x="60" y="105" font-family="Arial,sans-serif" font-size="16" fill="#4b5563">Quatro desenhos comuns, do mais simples ao mais robusto.</text><rect x="70" y="160" width="500" height="200" rx="18" fill="#eef6ff" stroke="#93c5fd" stroke-width="2"/><text x="95" y="200" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">A. Single host pessoal</text><text x="95" y="240" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• 1 gateway</text><text x="95" y="270" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• 1 workspace</text><text x="95" y="300" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• ótimo para uso pessoal e prototipagem</text><rect x="630" y="160" width="500" height="200" rx="18" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/><text x="655" y="200" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#6d28d9">B. Home server + tailnet</text><text x="655" y="240" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• 1 gateway always-on</text><text x="655" y="270" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• acesso remoto por Tailscale/SSH</text><text x="655" y="300" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• melhor UX para uso contínuo</text><rect x="70" y="410" width="500" height="200" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/><text x="95" y="450" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#15803d">C. Main + rescue</text><text x="95" y="490" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• 2 gateways no mesmo host</text><text x="95" y="520" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• isolamento forte / redundância</text><text x="95" y="550" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• ideal para quem já opera com mais maturidade</text><rect x="630" y="410" width="500" height="200" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/><text x="655" y="450" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#c2410c">D. Control plane + lab</text><text x="655" y="490" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• instância estável + instância de experimentos</text><text x="655" y="520" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• boa para evoluir sem arriscar o principal</text><text x="655" y="550" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• útil para skills/browser/testes mais arriscados</text><rect x="70" y="650" width="1060" height="40" rx="12" fill="#111827"/><text x="95" y="677" font-family="Arial,sans-serif" font-size="18" fill="#ffffff">Escolha a arquitetura pelo nível de isolamento, disponibilidade e disciplina operacional — não pela vontade de parecer “mais enterprise”.</text></svg>