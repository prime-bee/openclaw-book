<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#f8fafc"/><text x="60" y="70" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#111827">Migração de 1 gateway para múltiplos gateways</text><text x="60" y="105" font-family="Arial,sans-serif" font-size="16" fill="#4b5563">Estratégia progressiva: observar → separar → validar → virar tráfego.</text><rect x="70" y="170" width="240" height="220" rx="18" fill="#eef6ff" stroke="#93c5fd" stroke-width="2"/><text x="95" y="210" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">Fase 1</text><text x="95" y="245" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#111827">Mapear o estado atual</text><text x="95" y="285" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• canais</text><text x="95" y="315" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• workspaces</text><text x="95" y="345" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• portas</text><text x="95" y="375" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• credenciais</text><rect x="350" y="170" width="240" height="220" rx="18" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/><text x="375" y="210" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#6d28d9">Fase 2</text><text x="375" y="245" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#111827">Subir instância paralela</text><text x="375" y="285" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• novo profile</text><text x="375" y="315" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• nova porta base</text><text x="375" y="345" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• state isolado</text><text x="375" y="375" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• sem mexer no principal</text><rect x="630" y="170" width="240" height="220" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/><text x="655" y="210" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#15803d">Fase 3</text><text x="655" y="245" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#111827">Validar e ensaiar</text><text x="655" y="285" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• status</text><text x="655" y="315" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• browser</text><text x="655" y="345" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• canais</text><text x="655" y="375" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• rollback pronto</text><rect x="910" y="170" width="240" height="220" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/><text x="935" y="210" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#c2410c">Fase 4</text><text x="935" y="245" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#111827">Virar tráfego com calma</text><text x="935" y="285" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• mover um canal</text><text x="935" y="315" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• observar métricas</text><text x="935" y="345" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• estabilizar</text><text x="935" y="375" font-family="Arial,sans-serif" font-size="16" fill="#1f2937">• só então expandir</text><line x1="310" y1="280" x2="350" y2="280" stroke="#9ca3af" stroke-width="4"/><line x1="590" y1="280" x2="630" y2="280" stroke="#9ca3af" stroke-width="4"/><line x1="870" y1="280" x2="910" y2="280" stroke="#9ca3af" stroke-width="4"/><rect x="70" y="440" width="1080" height="60" rx="14" fill="#111827"/><text x="100" y="478" font-family="Arial,sans-serif" font-size="18" fill="#ffffff">Moral da história: não migre “virando a chave” de uma vez; opere em paralelo até o novo desenho provar que está saudável.</text></svg>